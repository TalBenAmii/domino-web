# Builds an UNSIGNED iOS .ipa on a free GitHub-hosted macOS runner.
#
# This is the "$0, no Mac, no Apple Developer Program" path:
#   1. This workflow compiles the app on a cloud Mac and uploads an unsigned
#      .ipa as a build artifact.
#   2. You download that .ipa and sideload it onto your iPhone from Windows
#      using Sideloadly / AltStore / SideStore, which sign it with your FREE
#      Apple ID (7-day signing).
#
# Free-runner notes:
#   - Public repo  -> macOS minutes are free.
#   - Private repo -> macOS minutes bill at 10x against the 2000 free min/month
#     (~200 effective min). A build takes ~5-10 min, so plenty for occasional
#     rebuilds. You only rebuild when the CODE changes; the weekly 7-day
#     re-sign is done locally by the sideloading tool, no rebuild needed.

name: iOS unsigned IPA (free sideload)

on:
  workflow_dispatch: {} # run manually from the Actions tab
  push:
    branches: [main]
    paths: # only rebuild when app code/config changes
      - 'lib/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - '.github/workflows/ios-unsigned-ipa.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned .app
        run: flutter build ios --release --no-codesign

      - name: Package into an (unsigned) .ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -qr app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: domino-unsigned-ipa
          path: build/ios/iphoneos/app-unsigned.ipa
          if-no-files-found: error
