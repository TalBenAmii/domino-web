<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DOMINO — תמלול קולי</title>

  <!-- PWA / install metadata -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#070c15" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DOMINO" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <style>
    :root {
      --bg: #070c15;
      --bg-2: #04070d;
      --surface: #0e1626;
      --surface-2: #121e33;
      --on-surface: #e9eef7;
      --muted: #828fa6;
      --border: #1c2940;
      --steel: #c7d0df;
      --red: #e11d2a;
      --red-bright: #ff4b59;
      --amber: #ff7a3d;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--on-surface);
      color-scheme: dark;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 12px);
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(1100px 720px at 50% -12%, rgba(225,29,42,0.12), transparent 60%),
        radial-gradient(900px 700px at 50% 120%, rgba(42,92,168,0.13), transparent 62%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }
    /* faint command-center grid, fading toward the edges */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(96,142,210,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,142,210,0.045) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(circle at 50% 32%, #000 0%, transparent 78%);
              mask-image: radial-gradient(circle at 50% 32%, #000 0%, transparent 78%);
    }
    body > * { position: relative; z-index: 1; }

    /* ── Brand header ─────────────────────────────────────────────────── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      padding: 18px 0 12px;
      text-align: center;
    }
    .brand-row { display: flex; align-items: center; gap: 13px; }
    .brand-mark { width: 56px; height: 38px; flex: none; filter: drop-shadow(0 4px 10px rgba(225,29,42,0.35)); }
    .wordmark {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 4px;
      line-height: 1;
      color: #f3f6fc;
    }
    /* custom dotted "i" — white stem, red dot, matching the logo */
    .wordmark .i {
      position: relative;
      display: inline-block;
      width: 0.2em;
      height: 0.78em;
      margin: 0 0.05em;
      vertical-align: baseline;
    }
    .wordmark .i::before {
      content: "";
      position: absolute;
      left: 0; bottom: 0;
      width: 100%;
      height: 0.54em;
      border-radius: 0.06em;
      background: linear-gradient(180deg, #f6f8fd, #cfd7e5);
    }
    .wordmark .i .i-dot {
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 0.2em; height: 0.2em;
      border-radius: 0.06em;
      background: var(--red);
      box-shadow: 0 0 0.5em rgba(225,29,42,0.85);
    }
    .tagline {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      max-width: 320px;
    }

    /* ── Transcript panel (HUD-style) ─────────────────────────────────── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, rgba(14,22,38,0.92), rgba(9,15,27,0.92));
      transition: border-color .25s, box-shadow .25s;
    }
    .panel::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      opacity: 0.75;
    }
    body.is-recording .panel {
      border-color: rgba(225,29,42,0.5);
      box-shadow: 0 0 0 1px rgba(225,29,42,0.18), 0 0 34px rgba(225,29,42,0.12);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 11px 14px;
      min-height: 46px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }
    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 600;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .25s, box-shadow .25s;
    }
    body.is-recording .live-dot {
      background: var(--red);
      box-shadow: 0 0 8px rgba(225,29,42,0.9);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    .panel-actions { display: flex; gap: 8px; }
    .panel-actions button {
      background: var(--surface-2);
      color: var(--on-surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 5px;
      transition: border-color .2s, background .2s;
    }
    .panel-actions button:hover { border-color: var(--red); }
    .panel-actions button.show { display: inline-flex; }

    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 23px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .transcript .interim { color: var(--muted); font-style: italic; }
    .placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 14px;
      text-align: center;
    }
    .placeholder svg { width: 54px; height: 54px; opacity: 0.45; }
    .placeholder div { font-size: 16px; letter-spacing: 0.5px; }

    /* ── Status line ──────────────────────────────────────────────────── */
    .status {
      text-align: center;
      color: var(--muted);
      min-height: 22px;
      margin: 16px 0 12px;
      font-size: 15px;
      letter-spacing: 0.3px;
    }
    .status.active { color: var(--red-bright); }
    .status.error  { color: var(--amber); font-weight: 600; }

    /* ── Mic button ───────────────────────────────────────────────────── */
    .mic-wrap {
      display: flex;
      justify-content: center;
      padding-bottom: 4px;
    }
    .mic {
      position: relative;
      width: 96px;
      height: 96px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--red), var(--red-bright));
      box-shadow: 0 14px 34px rgba(225,29,42,0.42), inset 0 1px 0 rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, box-shadow 0.25s, transform 0.1s;
    }
    .mic:active { transform: scale(0.96); }
    .mic svg { width: 42px; height: 42px; }
    .mic[disabled] {
      background: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: none;
      cursor: not-allowed;
      color: var(--muted);
    }
    .mic.recording {
      background: linear-gradient(135deg, #ff2333, #ff6b76);
      box-shadow: 0 14px 40px rgba(225,29,42,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .mic.recording::before,
    .mic.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(225,29,42,0.45);
      z-index: -1;
      animation: pulse 1.6s ease-out infinite;
    }
    .mic.recording::after { animation-delay: 0.8s; }
    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(2.1); opacity: 0;   }
    }
    .mic.busy { cursor: progress; }
    .mic.busy svg {
      animation: spin 0.8s linear infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer tagline (Hebrew) ──────────────────────────────────────── */
    .footer-tag {
      text-align: center;
      padding: 12px 0 2px;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(225,29,42,0.82);
      font-weight: 600;
    }

    /* ── Toast ────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-2);
      color: var(--on-surface);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 5;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Update prompt ────────────────────────────────────────────────── */
    .update-pill {
      position: fixed;
      left: 50%;
      top: calc(env(safe-area-inset-top) + 12px);
      transform: translateX(-50%) translateY(-16px);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface-2);
      color: var(--on-surface);
      border: 1px solid var(--red-bright);
      padding: 9px 16px;
      border-radius: 999px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 10;
    }
    .update-pill.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <header class="brand">
    <div class="brand-row">
      <svg class="brand-mark" viewBox="0 0 60 40" fill="none" aria-hidden="true">
        <!-- toppling steel dominoes -->
        <rect x="3"  y="13" width="8.5" height="21" rx="2.4" fill="#9fb0c7" transform="rotate(-17 7 23)"/>
        <rect x="13" y="10" width="8.5" height="24" rx="2.4" fill="#c4cfdf" transform="rotate(-9 17 22)"/>
        <rect x="24" y="8"  width="8.5" height="26" rx="2.4" fill="#e8edf5" transform="rotate(-3 28 21)"/>
        <!-- red medical tile -->
        <rect x="39" y="6" width="17" height="29" rx="4" fill="#e11d2a"/>
        <rect x="41" y="8" width="13" height="5" rx="2.5" fill="#ffffff" opacity="0.18"/>
        <!-- white cross -->
        <rect x="45.7" y="11"   width="3.6" height="19" rx="1.6" fill="#ffffff"/>
        <rect x="41"   y="18.7" width="13"  height="3.6" rx="1.6" fill="#ffffff"/>
      </svg>
      <span class="wordmark">DOM<span class="i"><span class="i-dot"></span></span>NO</span>
    </div>
    <div class="tagline">Decision-Oriented Medical Information &amp; Network Operations</div>
  </header>

  <main class="panel">
    <div class="panel-head">
      <span class="panel-title"><span class="live-dot"></span> תמלול חי</span>
      <div class="panel-actions">
        <button id="copyBtn" type="button">📋 העתק</button>
        <button id="clearBtn" type="button">🗑️ נקה</button>
      </div>
    </div>
    <div id="transcript" class="transcript" aria-live="polite"></div>
  </main>

  <div id="status" class="status"></div>

  <div class="mic-wrap">
    <button id="mic" class="mic" type="button" aria-label="הקלטה" disabled>
      <svg id="micIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
        <path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>
  </div>

  <div class="footer-tag">מידע · תיאום · החלטה · הצלת חיים</div>

  <div id="toast" class="toast"></div>
  <button id="updatePill" class="update-pill" type="button">
    <span aria-hidden="true">🔄</span> גרסה חדשה זמינה · רענן
  </button>

  <script>
    // ── Backend endpoint ──────────────────────────────────────────────────
    // Cloudflare Worker that holds the Groq API key and calls Whisper.
    const WORKER_URL = 'https://domino-stt.talba225.workers.dev/';
    // ──────────────────────────────────────────────────────────────────────
    // ── Streaming tunables (dial in on-device) ────────────────────────────
    const TIMESLICE_MS        = 1000;   // MediaRecorder chunk cadence
    const INTERIM_INTERVAL_MS = 4000;   // how often the live window re-transcribes
    const WINDOW_SOFT_MS      = 12000;  // after this, commit at the next pause
    const WINDOW_HARD_MS      = 30000;  // force-commit even without a pause
    const SILENCE_RMS         = 0.012;  // RMS below this counts as silence
    const SILENCE_HOLD_MS     = 350;    // sustained silence that counts as a pause
    // ──────────────────────────────────────────────────────────────────────

    const micBtn   = document.getElementById('mic');
    const micIcon  = document.getElementById('micIcon');
    const transEl  = document.getElementById('transcript');
    const statusEl = document.getElementById('status');
    const copyBtn  = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const toastEl  = document.getElementById('toast');

    const ICON_MIC  = '<path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>';
    const ICON_STOP = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    const ICON_SPIN = '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="42 60"/>';

    let mediaRecorder = null;
    let mediaStream   = null;
    let currentMime   = '';
    let audioCtx      = null;
    let analyser      = null;
    let silenceRAF    = null;

    let windowChunks  = [];     // audio chunks for the current window
    let windowId      = 0;      // bumps on each commit; invalidates stale interims
    let windowStart   = 0;      // Date.now() when the current window opened
    let interimTimer  = null;
    let inFlight      = false;  // an interim request is in flight
    let committing    = false;  // a window rotate / final stop is in progress
    let commitChain   = Promise.resolve();  // serializes commit appends in window order

    let belowSinceTs  = 0;      // when audio first dropped below SILENCE_RMS (0 = above)
    let isSilent      = false;

    let recording     = false;  // mic is capturing
    let finalizing    = false;  // stopped, flushing the final window
    let committedText = '';     // permanent text, never rewritten
    let interimText   = '';     // current window's provisional text
    let errorText     = '';

    // ── Pure helpers (no DOM / no IO; safe to unit-test later) ─────────────
    function shouldCommit(windowMs, silent) {
      if (windowMs >= WINDOW_HARD_MS) return true;
      if (windowMs >= WINDOW_SOFT_MS && silent) return true;
      return false;
    }
    function computeRms(samples) {
      let sum = 0;
      for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
      return Math.sqrt(sum / samples.length);
    }

    function render() {
      const safe = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const hasText = !!(committedText.trim() || interimText.trim());
      if (hasText) {
        let html = safe(committedText);
        if (interimText) {
          html = (html ? html + ' ' : '') + '<span class="interim">' + safe(interimText) + '</span>';
        }
        transEl.innerHTML = html;
        transEl.scrollTop = transEl.scrollHeight;
      } else {
        transEl.innerHTML =
          '<div class="placeholder">' +
          '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>' +
          '<div>הטקסט שלך יופיע כאן</div></div>';
      }

      copyBtn.classList.toggle('show', hasText);
      clearBtn.classList.toggle('show', hasText);

      micBtn.classList.toggle('recording', recording);
      micBtn.classList.toggle('busy', finalizing);
      micIcon.innerHTML = finalizing ? ICON_SPIN : (recording ? ICON_STOP : ICON_MIC);

      document.body.classList.toggle('is-recording', recording);
      document.body.classList.toggle('is-busy', finalizing);

      statusEl.className = 'status';
      if (errorText)        { statusEl.textContent = errorText;                statusEl.classList.add('error'); }
      else if (finalizing)  { statusEl.textContent = 'מסיים תמלול…';            statusEl.classList.add('active'); }
      else if (recording)   { statusEl.textContent = 'מקליט… תמלול חי';         statusEl.classList.add('active'); }
      else                  { statusEl.textContent = 'הקש על המיקרופון כדי להתחיל'; }
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    function pickMime() {
      const cands = [
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/mp4',
        'audio/ogg;codecs=opus',
        'audio/aac',
      ];
      for (const c of cands) {
        try { if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c; } catch (_) {}
      }
      return '';
    }

    // POST one audio blob to the Worker with a chosen model; returns trimmed text.
    async function transcribeBlob(blob, modelKey) {
      const type = blob.type || currentMime || 'audio/webm';
      const url = WORKER_URL + (WORKER_URL.indexOf('?') >= 0 ? '&' : '?') + 'model=' + modelKey;
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': type }, body: blob });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return (data && data.text ? String(data.text) : '').trim();
    }

    function startWindowRecorder() {
      if (!mediaStream) return;   // stream torn down (e.g. stop during rotation) — nothing to record
      try {
        mediaRecorder = currentMime ? new MediaRecorder(mediaStream, { mimeType: currentMime })
                                    : new MediaRecorder(mediaStream);
      } catch (_) {
        mediaRecorder = new MediaRecorder(mediaStream);
      }
      windowChunks = [];
      windowStart  = Date.now();
      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size) windowChunks.push(e.data);
        maybeCommit();
      };
      mediaRecorder.onstop = onWindowStop;
      mediaRecorder.start(TIMESLICE_MS);
    }

    function maybeCommit() {
      if (committing || finalizing || !recording) return;
      if (shouldCommit(Date.now() - windowStart, isSilent)) {
        committing = true;
        try { mediaRecorder.stop(); } catch (_) { committing = false; }
      }
    }

    function onWindowStop() {
      const type = currentMime || (windowChunks[0] && windowChunks[0].type) || 'audio/webm';
      const blob = windowChunks.length ? new Blob(windowChunks, { type }) : null;
      windowId++;             // any interim still in flight for the old window is now stale
      windowChunks = [];
      interimText  = '';      // cleared synchronously so the next window starts clean
      committing   = false;
      const wasFinalizing = finalizing;

      if (wasFinalizing) cleanupStream();
      else               startWindowRecorder();   // open the next window immediately

      // Serialize commits so committed text stays in window order even if a
      // slower v3 request for an earlier window resolves after a later one's.
      if (blob && blob.size) {
        commitChain = commitChain.then(() => commitTranscribe(blob, wasFinalizing)).catch(() => {});
      } else if (wasFinalizing) {
        commitChain = commitChain.then(() => finishIdle()).catch(() => {});
      } else {
        render();
      }
    }

    // Accurate (v3) transcription of a finished window; appends to permanent text.
    async function commitTranscribe(blob, isFinal) {
      let text = '';
      for (let attempt = 0; attempt < 2; attempt++) {       // one retry on failure
        try { text = await transcribeBlob(blob, 'v3'); break; }
        catch (_) { if (attempt === 1) showToast('חלק מהתמלול נכשל'); }
      }
      if (text) committedText = committedText ? (committedText + ' ' + text) : text;
      if (isFinal) finishIdle();
      else render();
    }

    function finishIdle() {
      finalizing = false;
      render();
    }

    function cleanupStream() {
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    }

    async function startRecording() {
      errorText = '';
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (_) {
        errorText = 'נא לאשר גישה למיקרופון';
        render();
        return;
      }
      currentMime = pickMime();
      interimText = '';
      recording   = true;
      finalizing  = false;
      startWindowRecorder();
      startSilenceMonitor();
      startInterimTimer();
      render();
    }

    function stopRecording() {
      recording  = false;
      finalizing = true;
      stopInterimTimer();
      stopSilenceMonitor();
      render();   // show the finalizing spinner
      if (committing) {
        // A window rotation is already mid-flight (maybeCommit already called
        // stop()). Its queued onWindowStop now sees finalizing=true and will
        // flush the final window, clean up, and go idle. Don't stop() twice.
        return;
      }
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        committing = true;
        try { mediaRecorder.stop(); }            // onstop flushes the final window + finishIdle
        catch (_) { committing = false; cleanupStream(); finishIdle(); }
      } else {
        cleanupStream();
        finishIdle();
      }
    }

    function startInterimTimer() {
      stopInterimTimer();
      interimTimer = setInterval(interimTick, INTERIM_INTERVAL_MS);
    }
    function stopInterimTimer() {
      if (interimTimer) { clearInterval(interimTimer); interimTimer = null; }
    }
    async function interimTick() {
      if (inFlight || committing || !windowChunks.length) return;
      const type  = currentMime || windowChunks[0].type || 'audio/webm';
      const blob  = new Blob(windowChunks, { type });
      const reqId = windowId;          // capture the window this request belongs to
      inFlight = true;
      try {
        const text = await transcribeBlob(blob, 'turbo');
        if (reqId === windowId) {       // still the same window → apply; else discard
          interimText = text;
          render();
        }
      } catch (_) {
        // transient: skip this tick, the next one has more audio
      } finally {
        inFlight = false;
      }
    }

    function startSilenceMonitor() {
      belowSinceTs = 0;
      isSilent = false;
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
        audioCtx.resume && audioCtx.resume().catch(() => {});
        const src = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        src.connect(analyser);
        const buf = new Float32Array(analyser.fftSize);
        const tick = () => {
          if (!recording || !analyser) return;
          analyser.getFloatTimeDomainData(buf);
          const now = Date.now();
          if (computeRms(buf) < SILENCE_RMS) {
            if (!belowSinceTs) belowSinceTs = now;
            isSilent = (now - belowSinceTs) >= SILENCE_HOLD_MS;
          } else {
            belowSinceTs = 0;
            isSilent = false;
          }
          silenceRAF = requestAnimationFrame(tick);
        };
        silenceRAF = requestAnimationFrame(tick);
      } catch (_) {
        // No Web Audio → isSilent stays false → windows commit at the hard cap only.
        audioCtx = null; analyser = null;
      }
    }
    function stopSilenceMonitor() {
      if (silenceRAF) cancelAnimationFrame(silenceRAF);
      silenceRAF = null;
      analyser = null;
      if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
    }

    micBtn.addEventListener('click', () => {
      if (finalizing) return;
      recording ? stopRecording() : startRecording();
    });

    clearBtn.addEventListener('click', () => {
      committedText = '';
      interimText   = '';
      errorText     = '';
      render();
    });

    copyBtn.addEventListener('click', async () => {
      const text = (committedText + (interimText ? ' ' + interimText : '')).trim();
      if (!text) return;
      try { await navigator.clipboard.writeText(text); showToast('הטקסט הועתק'); }
      catch (_) { showToast('ההעתקה נכשלה'); }
    });

    // Feature detection — getUserMedia + MediaRecorder are supported in every
    // modern browser (Chrome, Edge, Firefox, Safari, iOS).
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
      errorText = 'הדפדפן אינו תומך בהקלטת אודיו.';
      micBtn.disabled = true;
    } else if (!WORKER_URL || WORKER_URL.indexOf('__') === 0) {
      errorText = 'השרת לא הוגדר עדיין.';
      micBtn.disabled = true;
    } else {
      micBtn.disabled = false;
    }
    render();

    // Register service worker for installability / offline shell, plus
    // freshness handling so users never need a hard refresh:
    //  - updateViaCache:'none' => the browser always checks the network for a
    //    new sw.js instead of reusing GitHub Pages' 10-minute cached copy;
    //  - we re-check for updates on focus and hourly;
    //  - when a new version finishes installing we show a tappable pill, and
    //    the user refreshes on their own terms (never mid-recording).
    if ('serviceWorker' in navigator) {
      const updatePill = document.getElementById('updatePill');
      window.addEventListener('load', () => {
        // Remember whether a controller already exists so the first-ever install
        // (null -> controller via clients.claim) doesn't trigger a reload.
        const hadController = !!navigator.serviceWorker.controller;
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing || !hadController) return;
          refreshing = true;
          window.location.reload();
        });

        navigator.serviceWorker
          .register('sw.js', { updateViaCache: 'none' })
          .then((reg) => {
            const checkForUpdate = () => reg.update().catch(() => {});
            checkForUpdate();
            setInterval(checkForUpdate, 60 * 60 * 1000);
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') checkForUpdate();
            });

            reg.addEventListener('updatefound', () => {
              const incoming = reg.installing;
              if (!incoming) return;
              incoming.addEventListener('statechange', () => {
                // A new version finished installing while an old one still
                // controls the page => offer the refresh (first install has no
                // controller, so it stays silent).
                if (incoming.state === 'installed' && navigator.serviceWorker.controller) {
                  updatePill.classList.add('show');
                  updatePill.onclick = () => {
                    updatePill.classList.remove('show');
                    incoming.postMessage({ type: 'SKIP_WAITING' });
                  };
                }
              });
            });
          })
          .catch(() => {});
      });
    }
  </script>
</body>
