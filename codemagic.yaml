# Codemagic CI/CD configuration.
#
# This builds the iOS app in the cloud (no Mac required) and ships it to
# TestFlight, plus an optional Android APK workflow you can use instead of
# building locally.
#
# ────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (in the Codemagic web UI / Apple portals) before this runs:
#
#   1. Enroll in the Apple Developer Program ($99/yr) — required to install on a
#      physical iPhone without a Mac.
#   2. In App Store Connect, create the app record so it gets an Apple ID
#      (a number). Put that number in APP_STORE_APP_ID below.
#   3. In App Store Connect → Users and Access → Integrations → App Store
#      Connect API, create an API key (Issuer ID + Key ID + .p8 file).
#   4. In Codemagic → Teams/User settings → Integrations → App Store Connect,
#      add that key. Name it exactly "CodemagicASCKey" (or change the name in
#      the `integrations:` block below to match).
#   5. Connect this Git repository in Codemagic and start a build.
#
# Codemagic's automatic code signing uses the API key to create/fetch the
# distribution certificate + provisioning profile in the cloud — you never need
# a Mac or Xcode locally.
# ────────────────────────────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: iOS – TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASCKey
    environment:
      ios_signing:
        distribution_type: app_store          # for TestFlight / App Store
        bundle_identifier: com.tal.domino
      vars:
        APP_STORE_APP_ID: 0000000000          # <-- replace with your numeric App ID
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Apply signing profiles to the Xcode project
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true            # delivers to TestFlight for install on your iPhone

  # Optional: build a sideloadable Android APK in the cloud instead of locally.
  android-apk:
    name: Android – Debug APK
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
